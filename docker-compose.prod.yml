services:
  pdf-lite:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    ports:
      - "3033:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
